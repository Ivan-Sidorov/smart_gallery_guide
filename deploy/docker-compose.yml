name: smart-gallery-guide

services:
  postgres:
    image: ${POSTGRES_IMAGE:-postgres:16-bookworm}
    runtime: ${POSTGRES_RUNTIME:-runc}
    restart: unless-stopped
    command:
      - postgres
      - -c
      - huge_pages=off
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-smart_guide}
      POSTGRES_USER: ${POSTGRES_USER:-smart_guide}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-smart_guide}
      POSTGRES_INITDB_ARGS: ${POSTGRES_INITDB_ARGS:---set=huge_pages=off}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB -h 127.0.0.1"]
      interval: 10s
      timeout: 5s
      retries: 10

  vllm:
    image: vllm/vllm-openai:latest
    restart: unless-stopped
    command:
      - --model
      - ${VLLM_VLM_MODEL:-Qwen/Qwen3-VL-8B-Instruct}
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --max-model-len
      - ${VLLM_MAX_MODEL_LEN:-4096}
    environment:
      HF_HOME: /root/.cache/huggingface
    volumes:
      - hf_cache_vllm:/root/.cache/huggingface
    ports:
      - "${VLLM_PORT:-8000}:8000"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python3 -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=10).read(1)\"",
        ]
      interval: 15s
      timeout: 15s
      retries: 40
      start_period: 900s

  migrator:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
      target: migrator
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-smart_guide}:${POSTGRES_PASSWORD:-smart_guide}@postgres:5432/${POSTGRES_DB:-smart_guide}
      DATABASE_ECHO: "false"
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  api:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
      target: api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      migrator:
        condition: service_completed_successfully
      vllm:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-smart_guide}:${POSTGRES_PASSWORD:-smart_guide}@postgres:5432/${POSTGRES_DB:-smart_guide}
      CHROMA_PERSIST_DIR: /app/chroma_store
      HF_HOME: /home/appuser/.cache/huggingface
      API_HOST: 0.0.0.0
      API_PORT: "8080"
      API_LOAD_ML: "${API_LOAD_ML:-true}"
      API_LOG_LEVEL: "${API_LOG_LEVEL:-info}"
      VLLM_API_BASE_URL: http://vllm:8000/v1
      VLLM_VLM_MODEL: "${VLLM_VLM_MODEL:-Qwen/Qwen3-VL-8B-Instruct}"
      VLLM_API_KEY: "${VLLM_API_KEY:-}"
      WEB_SEARCH_ENABLED: "${WEB_SEARCH_ENABLED:-true}"
      WEB_SEARCH_MAX_RESULTS: "${WEB_SEARCH_MAX_RESULTS:-5}"
    ports:
      - "${API_PORT:-8080}:8080"
    volumes:
      - chroma_data:/app/chroma_store
      - exhibits_data:/app/data/exhibits
      - hf_cache_app:/home/appuser/.cache/huggingface
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/healthz > /dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 40s
    stop_grace_period: 45s

  adapter-telegram:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
      target: adapter-telegram
    restart: unless-stopped
    env_file:
      - ../.env
    depends_on:
      api:
        condition: service_healthy
    environment:
      ADAPTER_BACKEND_URL: http://api:8080
      ADAPTER_LOG_LEVEL: "${ADAPTER_LOG_LEVEL:-info}"
      ADAPTER_HTTP_TIMEOUT_S: "${ADAPTER_HTTP_TIMEOUT_S:-30.0}"
      ADAPTER_TASK_POLL_INITIAL_S: "${ADAPTER_TASK_POLL_INITIAL_S:-0.5}"
      ADAPTER_TASK_POLL_MAX_S: "${ADAPTER_TASK_POLL_MAX_S:-3.0}"
      ADAPTER_TASK_POLL_FACTOR: "${ADAPTER_TASK_POLL_FACTOR:-1.5}"
      ADAPTER_TASK_POLL_TIMEOUT_S: "${ADAPTER_TASK_POLL_TIMEOUT_S:-120.0}"
    stop_grace_period: 20s

  vlm-worker:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
      target: vlm-worker
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      migrator:
        condition: service_completed_successfully
      vllm:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-smart_guide}:${POSTGRES_PASSWORD:-smart_guide}@postgres:5432/${POSTGRES_DB:-smart_guide}
      HF_HOME: /home/appuser/.cache/huggingface
      VLLM_API_BASE_URL: http://vllm:8000/v1
      VLLM_VLM_MODEL: "${VLLM_VLM_MODEL:-Qwen/Qwen3-VL-8B-Instruct}"
      VLLM_API_KEY: "${VLLM_API_KEY:-}"
      WEB_SEARCH_ENABLED: "${WEB_SEARCH_ENABLED:-true}"
      WEB_SEARCH_MAX_RESULTS: "${WEB_SEARCH_MAX_RESULTS:-5}"
      WORKER_POLL_INTERVAL_S: "${WORKER_POLL_INTERVAL_S:-1.0}"
      WORKER_CONCURRENCY: "${WORKER_CONCURRENCY:-2}"
      WORKER_STALE_TIMEOUT_S: "${WORKER_STALE_TIMEOUT_S:-300}"
      WORKER_STALE_CHECK_INTERVAL_S: "${WORKER_STALE_CHECK_INTERVAL_S:-60}"
      WORKER_LOG_LEVEL: "${WORKER_LOG_LEVEL:-info}"
    volumes:
      - exhibits_data:/app/data/exhibits:ro
      - hf_cache_app:/home/appuser/.cache/huggingface
    stop_grace_period: 45s

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "${NGINX_PORT:-80}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/nginx-health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 6

volumes:
  pgdata:
  chroma_data:
  exhibits_data:
  hf_cache_vllm:
  hf_cache_app:
